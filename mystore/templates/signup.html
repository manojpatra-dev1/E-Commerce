{% extends 'base.html' %}

{% block main %}
<style>

.border{
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(12px);
    border:none;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.btn{
    background: linear-gradient(135deg,#2563eb,#1d4ed8);
    color:white;
}
input{
    border-radius:10px;
}

</style>
   <div class="container">
       <div class="row m-4">
           <div class="col-lg-6 mx-auto">
               <div class="border shadow">
                   <h1 class="m-5 border-bottom">Create an Account</h1>
                   {% if error %}
                       <div class="alert alert-danger alert-dismissible fade show m-3" role="alert">
                           <strong>{{ error }}</strong>
                           <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                       </div>
                   {% elif success %}
                       <div class="alert alert-success alert-dismissible fade show m-3" role="alert">
                           <strong>{{ success }}</strong>
                           <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                       </div>
                   {% endif %}

                   <form method="POST" action="/signup/" class="m-5">
                       {% csrf_token %}
                       <div class="form-group">
                           <label>First Name:</label>
                           <input type="text" name="fname" class="form-control" value="{{ value.first_name }}">
                       </div>

                       <div class="form-group">
                           <label>Last Name:</label>
                           <input type="text" name="lname" class="form-control" value="{{ value.last_name }}">
                       </div>

                       <div class="form-group">
                           <label>Email Address:</label>
                           <input type="email" name="email" class="form-control" value="{{ value.email }}">
                       </div>

                       <div class="form-group">
                           <label>Mobile Number (10-digit):</label>
                           <input type="number" name="mobile" class="form-control" value="{{ value.mobile }}">
                       </div>

                       <div class="form-group">
                           <label>Password:</label>
                           <input type="password" name="password" placeholder="Enter Password" class="form-control">
                           <input type="password" name="confirm_password" placeholder="Confirm Password" class="form-control mt-4">
                       </div>

                       <div class="form-group">
                           <input type="submit" value="Signup" class="btn btn-outline-dark mt-3 form-control">
                       </div>
                   </form>
               </div>
           </div>
       </div>
   </div>
{% endblock %}
