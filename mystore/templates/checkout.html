{% extends "base.html" %}

{% load static %}

{% block main %}

<style>

    body{
        background-color: gray;
    }

</style>


<br>

<div class="container bg-white shadow-md p-5" style="width:500px; border-radius:20px;">

    <form id="form">

        <div>

            <h3>
                <i class="fa fa-chevron-circle-right" aria-hidden="true"></i>
                &nbsp; Complete your order
            </h3>

            <p>Please enter the relevant information below.</p>

            <hr>

            <br>

            <div class="form-field">

                <input
                    class="form-control"
                    id="name"
                    type="text"
                    placeholder="Full name*"
                    autocomplete="off"
                    value="{{shipping.full_name}}"
                    required
                >

            </div>

            <br>

            <div class="form-field">

                <input
                    class="form-control"
                    id="email"
                    type="email"
                    placeholder="Email address*"
                    autocomplete="off"
                    value="{{shipping.email}}"
                    required
                >

            </div>

            <br>

            <div class="form-field">

                <input
                    class="form-control"
                    id="address1"
                    type="text"
                    placeholder="Address 1*"
                    autocomplete="off"
                    value="{{shipping.address1}}"
                    required
                >

            </div>

            <br>

            <div class="form-field">

                <input
                    class="form-control"
                    id="address2"
                    type="text"
                    placeholder="Address 2*"
                    autocomplete="off"
                    value="{{shipping.address2}}"
                    required
                >

            </div>

            <br>

            <div class="form-field">

                <input
                    class="form-control"
                    id="city"
                    type="text"
                    placeholder="City*"
                    autocomplete="off"
                    value="{{shipping.city}}"
                    required
                >

            </div>

            <br>

            <div class="form-field">

                <input
                    class="form-control"
                    id="state"
                    type="text"
                    placeholder="State (Optional)"
                    autocomplete="off"
                    value="{{shipping.state}}"
                >

            </div>

            <br>

            <div class="form-field">

                <input
                    class="form-control"
                    id="zipcode"
                    type="text"
                    placeholder="Zip code (Optional)"
                    autocomplete="off"
                    value="{{shipping.zipcode}}"
                >

            </div>

        </div>

        <br>

        <button
            type="submit"
            id="complete-order"
            class="btn btn-primary w-100 text-white"
        >
            Complete Order
        </button>

    </form>

</div>

<br>


<script>

    $('#form').on('submit', function(e){

        e.preventDefault();

        $.ajax({

            type: 'POST',

            url: '{% url "complete-order" %}',

            data: {

                name: $('#name').val(),
                email: $('#email').val(),

                address1: $('#address1').val(),
                address2: $('#address2').val(),
                city: $('#city').val(),

                state: $('#state').val(),
                zipcode: $('#zipcode').val(),

                csrfmiddlewaretoken: "{{csrf_token}}",
                action: 'post'

            },

            success: function(json){

                window.location.replace("{% url 'payment-success' %}");

            },

            error: function(xhr, errmsg, err){

                window.location.replace("{% url 'payment-failed' %}");

            }

        });

    });

</script>

{% endblock %}
