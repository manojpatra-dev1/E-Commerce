<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>

    <title>{% block title %}{% endblock %}</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap JS (IMPORTANT for toggle) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* GLOBAL */
body{
    background: linear-gradient(135deg,#eef2ff,#f8fafc,#e0f2fe);
    font-family:'Inter',sans-serif;
}

/* NAVBAR */
.main-navbar{
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(12px);
    padding:16px 0;
}

/* LOGO */
.brand-logo{
    font-size:28px;
    font-weight:800;
    color:#111827 !important;
    text-decoration:none;
}

/* SEARCH */
.search-input{
    background: rgba(255,255,255,0.7);
    border-radius:14px;
    padding:10px 15px;
    border:none;
    width:100%;
}

/* NAV LINKS */
.nav-link-custom{
    text-decoration:none;
    color:#111827;
    font-weight:600;
    margin-left:15px;
}

/* MOBILE FIX */
@media (max-width:768px){
    .nav-link-custom{
        display:block;
        margin:10px 0;
    }
}

/* CART BADGE */
.cart-badge{
    background:#111827;
    color:white;
    border-radius:50%;
    padding:4px 8px;
    font-size:12px;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg main-navbar">
<div class="container">

<!-- LOGO -->
<a href="/" class="brand-logo">MojoMart 🛒</a>

<!-- ✅ TOGGLE BUTTON (THIS WAS MISSING) -->
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
    <span class="navbar-toggler-icon"></span>
</button>

<!-- COLLAPSIBLE CONTENT -->
<div class="collapse navbar-collapse" id="navbarContent">

<!-- SEARCH -->
<form method="GET" action="/" class="mx-lg-5 flex-grow-1 my-3 my-lg-0">
    <input type="search" name="search" class="search-input" placeholder="Search products">
</form>

<!-- RIGHT SIDE -->
<div class="d-lg-flex align-items-center ms-auto">


{% if request.session.customer_id %}

<a href="{% url 'cart' %}" class="nav-link-custom">
🛒 Cart <span class="cart-badge">{{ request.session.cart|length }}</span>
</a>

<a href="{% url 'logout' %}" class="nav-link-custom">Logout</a>

{% else %}

<a href="/signup/" class="nav-link-custom">Signup</a>
<a href="/login/" class="nav-link-custom">Signin</a>

{% endif %}

</div>

</div>
</div>
</nav>

<div class="container mt-4">
{% block main %}{% endblock %}
</div>

</body>
</html>
